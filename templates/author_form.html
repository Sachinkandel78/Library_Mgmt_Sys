{% extends 'base.html' %}

{% block content %}
    <h1>{% if author %}Edit Author{% else %}Add New Author{% endif %}</h1>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label>Name:</label>
            <input type="text" name="name" class="form-control" value="{% if author %}{{ author.name }}{% endif %}" maxlength="100" required>
        </div>

        <div class="mb-3">
            <label>Date of Birth:</label>
            <input type="date" name="date_of_birth" class="form-control" value="{% if author %}{{ author.date_of_birth|date:'Y-m-d' }}{% endif %}">
        </div>

        <div class="mb-3">
            <label>Bio:</label>
            <textarea name="bio" class="form-control" rows="4">{% if author %}{{ author.bio }}{% endif %}</textarea>
        </div>

        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{% url 'author_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
{% endblock %}
