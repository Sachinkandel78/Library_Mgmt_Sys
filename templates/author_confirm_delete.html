{% extends 'base.html' %}

{% block content %}
    <h1>Delete Author</h1>
    <p>Are you sure you want to delete <strong>{{ author.name }}</strong>?</p>
    <p class="text-danger">Warning: this will also delete all books by this author.</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'author_detail' author.pk %}" class="btn btn-secondary">Cancel</a>
    </form>
{% endblock %}
